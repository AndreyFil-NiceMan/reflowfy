# E2E Test Infrastructure
# This compose file provides test dependencies (elasticsearch, mock servers)
# Used alongside the generated docker-compose.yml from reflowfy init
#
# Usage: docker-compose -f docker-compose.e2e-infra.yml up -d
networks:
  reflowfy-network:
    name: e2e_workspace_reflowfy-network
    driver: bridge

services:
  # ============================================================================
  # Elasticsearch (for Elastic Source Tests)
  # ============================================================================

  e2e-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: reflofy-e2e-elasticsearch
    environment:
      - discovery.type=single-node
      - cluster.name=reflofy-e2e-cluster
      - node.name=reflofy-e2e-node
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - network.host=0.0.0.0
    ports:
      - '9201:9200'
      - '9301:9300'
    networks:
      - reflowfy-network
    healthcheck:
      test:
        ['CMD-SHELL', 'curl -f http://localhost:9200/_cluster/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    volumes:
      - e2e-elasticsearch-data:/usr/share/elasticsearch/data

  # ============================================================================
  # Mock HTTP Server for HTTP Destination Tests
  # ============================================================================

  e2e-mock-http:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: reflofy-e2e-mock-http
    command: python -m tests.e2e.destinations.mock_http_server
    ports:
      - '8091:8091'
    volumes:
      - ./tests:/app/tests:ro
    networks:
      - reflowfy-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8091/health'')" || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Mock API Server for API Source Tests
  # ============================================================================

  e2e-mock-api:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: reflofy-e2e-mock-api
    command: python -m uvicorn tests.e2e.sources.mock_api_server:app --host 0.0.0.0 --port 8092
    ports:
      - '8092:8092'
    volumes:
      - ./tests:/app/tests:ro
    networks:
      - reflowfy-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8092/health'')" || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Kafka with SASL_PLAINTEXT (for E2E Tests)
  # ============================================================================

  e2e-zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: reflofy-e2e-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - reflowfy-network

  e2e-kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: reflofy-e2e-kafka
    depends_on:
      - e2e-zookeeper
    ports:
      - '9095:9095'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: e2e-zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,SASL_PLAINTEXT:SASL_PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://reflofy-e2e-kafka:29092,SASL_PLAINTEXT://localhost:9095
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,SASL_PLAINTEXT://0.0.0.0:9095
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_OPTS: '-Djava.security.auth.login.config=/tmp/kafka_jaas.conf -Dzookeeper.sasl.client=false'
    command:
      - bash
      - -c
      - |
        # Generate JAAS config inline (no external file needed)
        cat > /tmp/kafka_jaas.conf <<'EOF'
        KafkaServer {
          org.apache.kafka.common.security.plain.PlainLoginModule required
          username="admin"
          password="admin-secret"
          user_admin="admin-secret";
        };
        EOF
        # Wait for Zookeeper via simple TCP (bypasses cub's SASL issue)
        echo "Waiting for Zookeeper..."
        while ! nc -z e2e-zookeeper 2181 2>/dev/null; do sleep 1; done
        echo "Zookeeper is ready, starting Kafka..."
        # Run Confluent's configure + launch directly (skips cub zk-ready)
        /etc/confluent/docker/ensure
        /etc/confluent/docker/configure
        /etc/confluent/docker/launch
    networks:
      - reflowfy-network
    healthcheck:
      test:
        ['CMD-SHELL', 'kafka-topics --list --bootstrap-server localhost:29092']
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  e2e-elasticsearch-data:

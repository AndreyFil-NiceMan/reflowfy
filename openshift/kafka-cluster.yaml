apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: reflowfy-kafka
  namespace: kofli-dev
spec:
  kafka:
    version: 3.7.0
    replicas: 1
    listeners:
      # Internal listener with SASL
      - name: sasl
        port: 9092
        type: internal
        tls: false
        authentication:
          type: scram-sha-256
      # External listener via OpenShift Route with TLS and SASL
      - name: external
        port: 9094
        type: route
        tls: true
        authentication:
          type: scram-sha-256
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      inter.broker.protocol.version: "3.7"
    storage:
      type: ephemeral
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 1Gi
        cpu: 500m
  zookeeper:
    replicas: 1
    storage:
      type: ephemeral
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 250m
  entityOperator:
    topicOperator: {}
    userOperator: {}

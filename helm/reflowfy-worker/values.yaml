replicaCount: 1

image:
  repository: reflowfy-worker
  pullPolicy: IfNotPresent
  tag: "0.1.0"

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

kafka:
  bootstrapServers: "kafka:9092"
  topic: "reflow.jobs"
  groupId: "reflowfy-workers"

keda:
  enabled: true
  minReplicaCount: 0
  maxReplicaCount: 100
  pollingInterval: 10
  cooldownPeriod: 60
  lagThreshold: 10

env:
  - name: KAFKA_BOOTSTRAP_SERVERS
    value: "kafka:9092"
  - name: KAFKA_TOPIC
    value: "reflow.jobs"
  - name: KAFKA_GROUP_ID
    value: "reflowfy-workers"

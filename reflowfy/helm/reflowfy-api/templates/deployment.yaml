apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reflowfy-api.fullname" . }}
  labels:
    app: reflowfy-api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: reflowfy-api
  template:
    metadata:
      labels:
        app: reflowfy-api
    spec:
      containers:
      - name: api
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 8000
        env:
        {{- toYaml .Values.env | nindent 8 }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10

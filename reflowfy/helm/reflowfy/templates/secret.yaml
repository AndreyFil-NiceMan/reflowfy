{{/*
Secret for external PostgreSQL password (only when using external DB without existing secret)
*/}}
{{- if and (not .Values.postgresql.enabled) (not .Values.postgresql.external.existingSecret) .Values.postgresql.external.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-postgresql-external
  labels:
    {{- include "reflowfy.labels" . | nindent 4 }}
type: Opaque
data:
  password: {{ .Values.postgresql.external.password | b64enc | quote }}
{{- end }}
{{/*
Secret for Kafka SASL credentials (only when SASL is enabled and no existing secret is provided)
*/}}
{{- if and .Values.kafka.sasl.enabled (not .Values.kafka.sasl.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-kafka-sasl
  labels:
    {{- include "reflowfy.labels" . | nindent 4 }}
type: Opaque
data:
  username: {{ .Values.kafka.sasl.username | b64enc | quote }}
  password: {{ required "kafka.sasl.password is required when kafka.sasl.enabled is true and no kafka.sasl.existingSecret is provided" .Values.kafka.sasl.password | b64enc | quote }}
{{- end }}
{{/*
Secret for Elasticsearch log-shipping password (chart-managed; skipped when an
existingSecret is provided or no password is set)
*/}}
{{- if and .Values.observability.elasticLog.password (not .Values.observability.elasticLog.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-elastic-log
  labels:
    {{- include "reflowfy.labels" . | nindent 4 }}
type: Opaque
data:
  password: {{ .Values.observability.elasticLog.password | b64enc | quote }}
{{- end }}

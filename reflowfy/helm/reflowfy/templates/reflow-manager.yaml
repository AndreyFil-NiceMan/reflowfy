{{- if .Values.reflowManager.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-reflow-manager
  labels:
    {{- include "reflowfy.labels" . | nindent 4 }}
    app.kubernetes.io/component: reflow-manager
spec:
  replicas: {{ .Values.reflowManager.replicaCount }}
  selector:
    matchLabels:
      app: reflowfy-reflow-manager
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: reflowfy-reflow-manager
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: reflow-manager
    spec:
      {{- with .Values.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL at $DATABASE_HOST:$DATABASE_PORT..."
              until nc -z $DATABASE_HOST $DATABASE_PORT; do 
                echo "PostgreSQL not ready, sleeping 2s..."
                sleep 2
              done
              echo "PostgreSQL is ready!"

              echo "Waiting for Kafka at $KAFKA_BOOTSTRAP_SERVERS..."
              # Extract host and port from bootstrap servers string (handles "host:port")
              # Extract host and port from the first broker in the list
              first_broker=$(echo $KAFKA_BOOTSTRAP_SERVERS | cut -d, -f1)
              host=$(echo $first_broker | cut -d: -f1)
              port=$(echo $first_broker | cut -d: -f2)
              until nc -z $host $port; do 
                echo "Kafka not ready ($host:$port), sleeping 2s..."
                sleep 2
              done
              echo "Kafka is ready!"
          env:
            - name: DATABASE_HOST
              value: {{ include "reflowfy.postgresql.host" . | quote }}
            - name: DATABASE_PORT
              value: {{ include "reflowfy.postgresql.port" . | quote }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ include "reflowfy.kafka.bootstrapServers" . | quote }}
      containers:
        - name: reflow-manager
          image: "{{ .Values.reflowManager.image.repository }}:{{ .Values.reflowManager.image.tag }}"
          imagePullPolicy: {{ .Values.reflowManager.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8001"
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "reflowfy.postgresql.secretName" . }}
                  key: {{ include "reflowfy.postgresql.secretKey" . }}
            - name: DATABASE_URL
              value: {{ include "reflowfy.databaseUrl" . | quote }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ include "reflowfy.kafka.bootstrapServers" . | quote }}
            - name: KAFKA_TOPIC
              value: {{ include "reflowfy.kafka.topic" . | quote }}
            {{- if .Values.kafka.sasl.enabled }}
            - name: KAFKA_SECURITY_PROTOCOL
              value: {{ .Values.kafka.sasl.securityProtocol | quote }}
            - name: KAFKA_SASL_MECHANISM
              value: {{ .Values.kafka.sasl.mechanism | quote }}
            - name: KAFKA_SASL_USERNAME
              value: {{ .Values.kafka.sasl.username | quote }}
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.kafka.sasl.existingSecret }}
                  key: {{ .Values.kafka.sasl.existingSecretPasswordKey }}
            {{- end }}
            - name: MAX_JOBS_PER_SECOND
              value: {{ .Values.reflowManager.maxJobsPerSecond | quote }}
            - name: PIPELINE_MODULE
              value: {{ .Values.reflowManager.pipelineModule | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.reflowManager.logLevel | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.reflowManager.resources | nindent 12 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-reflow-manager
  labels:
    {{- include "reflowfy.labels" . | nindent 4 }}
    app.kubernetes.io/component: reflow-manager
spec:
  type: {{ .Values.reflowManager.service.type }}
  ports:
    - port: {{ .Values.reflowManager.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: reflowfy-reflow-manager
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}

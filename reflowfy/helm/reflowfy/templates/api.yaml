{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    {{- include "reflowfy.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: reflowfy-api
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      {{- if .Values.deployTimestamp }}
      annotations:
        reflowfy.io/restartedAt: {{ .Values.deployTimestamp | quote }}
      {{- end }}
      labels:
        app: reflowfy-api
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: api
    spec:
      {{- with .Values.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-dependencies
          image: {{ .Values.busybox.image }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for ReflowManager at $REFLOW_MANAGER_HOST:$REFLOW_MANAGER_PORT..."
              until nc -w 1 $REFLOW_MANAGER_HOST $REFLOW_MANAGER_PORT </dev/null; do
                echo "ReflowManager not ready, sleeping 2s..."
                sleep 2
              done
              echo "ReflowManager is ready!"

              echo "Waiting for Kafka at $KAFKA_BOOTSTRAP_SERVERS..."
              # Extract host and port from the first broker in the list
              first_broker=$(echo $KAFKA_BOOTSTRAP_SERVERS | cut -d, -f1)
              host=$(echo $first_broker | cut -d: -f1)
              port=$(echo $first_broker | cut -d: -f2)
              until nc -w 1 $host $port </dev/null; do
                echo "Kafka not ready ($host:$port), sleeping 2s..."
                sleep 2
              done
              echo "Kafka is ready!"
          env:
            - name: REFLOW_MANAGER_HOST
              value: "{{ .Release.Name }}-reflow-manager"
            - name: REFLOW_MANAGER_PORT
              value: "{{ .Values.reflowManager.service.port }}"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ include "reflowfy.kafka.bootstrapServers" . | quote }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            {{- include "reflowfy.observability.env" . | nindent 12 }}
            - name: API_HOST
              value: "0.0.0.0"
            - name: API_PORT
              value: "8000"
            - name: REFLOW_MANAGER_URL
              value: "http://{{ .Release.Name }}-reflow-manager:{{ .Values.reflowManager.service.port }}"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ include "reflowfy.kafka.bootstrapServers" . | quote }}
            - name: KAFKA_TOPIC
              value: {{ include "reflowfy.kafka.topic" . | quote }}
            - name: PIPELINE_MODULE
              value: {{ .Values.reflowManager.pipelineModule | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api
  labels:
    {{- include "reflowfy.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: reflowfy-api
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}

#####################################
# INFRASTRUCTURE - POSTGRESQL
#####################################
postgresql:
  # Set to true to deploy PostgreSQL via Bitnami chart
  # Set to false to use external PostgreSQL
  enabled: true

  # External PostgreSQL configuration (used when enabled=false)
  external:
    host: ""              # Required if enabled=false
    port: 5432
    database: "reflowfy"
    username: "reflowfy"
    password: ""          # Plain password (use existingSecret in production)
    existingSecret: ""    # Name of K8s secret containing password
    existingSecretPasswordKey: "password"

  # Bitnami PostgreSQL chart values (used when enabled=true)
  auth:
    postgresPassword: "reflowfy"
    username: "reflowfy"
    password: "reflowfy"
    database: "reflowfy"
  primary:
    persistence:
      enabled: true
      size: 1Gi
    # OpenShift compatible
    podSecurityContext:
      enabled: false
    containerSecurityContext:
      enabled: false

#####################################
# INFRASTRUCTURE - KAFKA
#####################################
kafka:
  # Set to true to deploy Kafka via Bitnami chart
  # Set to false to use external Kafka
  enabled: false

  # External Kafka configuration (used when enabled=false)
  external:
    bootstrapServers: "kafka:29092"  # Using internal docker network alias

  # Common settings (used in both modes)
  topic: "reflowfy.jobs"
  groupId: "reflowfy-workers"

  # Bitnami Kafka chart values (used when enabled=true)
  # Using KRaft mode (no Zookeeper required)
  kraft:
    enabled: true
  controller:
    replicaCount: 1
  broker:
    replicaCount: 0  # Combined mode - controller is also broker
  listeners:
    client:
      protocol: PLAINTEXT
    controller:
      protocol: PLAINTEXT
    interbroker:
      protocol: PLAINTEXT
  persistence:
    enabled: true
    size: 1Gi
  # OpenShift compatible
  podSecurityContext:
    enabled: false
  containerSecurityContext:
    enabled: false

#####################################
# REFLOWFY COMPONENTS
#####################################

# API Service
api:
  enabled: true
  replicaCount: 1
  image:
    repository: reflowfy-api
    tag: "local"
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 8000
    # nodePort: 30000  # Optional: fix the port
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 256Mi

# ReflowManager Service
reflowManager:
  enabled: true
  replicaCount: 1
  image:
    repository: reflowfy-reflow-manager
    tag: "local"
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 8001
    # nodePort: 30001  # Optional: fix the port
  maxJobsPerSecond: 100
  pipelineModule: "pipelines"
  logLevel: "INFO"
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 256Mi

# Worker
worker:
  enabled: true
  replicaCount: 1
  image:
    repository: reflowfy-worker
    tag: "local"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 250m
      memory: 256Mi
  # KEDA autoscaling (disabled by default for local testing)
  keda:
    enabled: false
    minReplicaCount: 0
    maxReplicaCount: 100
    pollingInterval: 10
    cooldownPeriod: 60
    lagThreshold: 10

#####################################
# GLOBAL SETTINGS
#####################################
global:
  # Image pull secrets (if using private registry)
  imagePullSecrets: []

# Pod security context (set runAsNonRoot: true for OpenShift if images support it)
podSecurityContext: {}
  # runAsNonRoot: true
  # seccompProfile:
  #   type: RuntimeDefault

securityContext: {}
  # allowPrivilegeEscalation: false
  # capabilities:
  #   drop:
  #     - ALL
  # readOnlyRootFilesystem: false

# Host aliases for DNS resolution hacking (useful for minikube external services)
hostAliases:
  - ip: "192.168.49.3"
    hostnames:
      - "kafka"


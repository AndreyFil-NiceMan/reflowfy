version: '3.8'

services:
  # Elasticsearch - single node for testing
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: reflofy-elasticsearch
    environment:
      # Cluster settings
      - discovery.type=single-node
      - cluster.name=reflofy-cluster
      - node.name=reflofy-node

      # Memory settings
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"

      # Disable security for local testing
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false

      # Network settings
      - network.host=0.0.0.0
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - reflofy-elastic-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # Kibana - for data visualization (optional but helpful)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: reflofy-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=reflofy-kibana
      - XPACK_SECURITY_ENABLED=false
    ports:
      - "5601:5601"
    networks:
      - reflofy-elastic-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  elasticsearch-data:
    driver: local

networks:
  reflofy-elastic-network:
    driver: bridge
    external: false
